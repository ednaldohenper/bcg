kind = "web"
previewPath = "/"
title = "Customer Strategy Generator"
version = "1.0.0"
id = "artifacts/client-strategy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18233
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/client-strategy run dev"

[services.env]
PORT = "18233"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/client-strategy", "run", "build"]
publicDir = "artifacts/client-strategy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
